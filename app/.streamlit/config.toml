# Streamlit configuration
[theme]
primaryColor = "#00dd00"
backgroundColor = "#0e1117"
secondaryBackgroundColor = "#262730"
textColor = "#fafafa"
font = "sans serif"

[client]
showErrorDetails = false
maxUploadSize = 200

[logger]
level = "info"

[server]
port = 8501
headless = true
enableXsrfProtection = true
